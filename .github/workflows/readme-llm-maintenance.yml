name: README LLM Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate conservative README update with LLM
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: |
          set -euo pipefail

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          repo_tree=$(find . -maxdepth 3 -type f \
            -not -path './.git/*' \
            -not -path './.github/workflows/*' \
            | sed 's#^./##' \
            | sort)

          prompt_file=$(mktemp)
          {
            cat <<'PROMPT'
You are maintaining a technical README in a protocol repository.

Goal:
- Improve accuracy and clarity of README details.

Hard constraints:
- Make only minimal, conservative edits.
- Do not rewrite structure or tone.
- Do not remove existing sections unless they are clearly incorrect.
- Preserve headings and most wording.
- Keep edits focused on specific details (paths, filenames, short clarifications).
- Return the full updated README markdown only.
PROMPT
            echo
            echo "Repository file tree (depth<=3):"
            echo "$repo_tree"
            echo
            echo "Current README.md:"
            cat README.md
          } > "$prompt_file"

          payload=$(jq -n \
            --rawfile prompt "$prompt_file" \
            --arg model "$OPENAI_MODEL" \
            '{
              model: $model,
              input: [
                {
                  role: "user",
                  content: [
                    { type: "input_text", text: $prompt }
                  ]
                }
              ],
              max_output_tokens: 2200
            }')

          response=$(curl -sS https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload")

          updated_readme=$(echo "$response" | jq -r '.output_text // empty')

          if [ -z "$updated_readme" ]; then
            echo "LLM response did not contain output_text."
            echo "$response" | jq .
            exit 1
          fi

          printf '%s\n' "$updated_readme" > README.md

      - name: Guardrail: skip sweeping README edits
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "No README changes."
            exit 0
          fi

          changed_lines=$(git diff --numstat -- README.md | awk '{print $1 + $2}')
          max_changed_lines=80

          if [ "$changed_lines" -gt "$max_changed_lines" ]; then
            echo "README edit too large (${changed_lines} lines changed). Reverting."
            git checkout -- README.md
          else
            echo "README update within guardrail (${changed_lines} lines changed)."
          fi

      - name: Commit README update
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "No commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: conservative README detail refresh"
          git push

      - name: Skip (missing API key)
        if: ${{ secrets.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY secret is not set; skipping README update job."
